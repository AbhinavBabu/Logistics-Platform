apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipments-service
  labels:
    app: shipments-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipments-service
  template:
    metadata:
      labels:
        app: shipments-service
    spec:
      containers:
      - name: shipments-service
        image: yourdockerhubusername/logistics-shipments-service:latest
        ports:
        - containerPort: 3003
        env:
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_HOST
          value: "shipments-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "shipments_db"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
