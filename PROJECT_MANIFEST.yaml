version: '3.0'

version: '3.0'

metadata:
  name: Logistics Platform - Project Overview
  description: Microservices-based logistics platform

architecture:
  type: Three-tier with microservices
  pattern: Database per microservice
  communication: REST API with JWT auth
  
services:
  frontend:
    name: React Frontend
    purpose: User interface and dashboard
    port: 3000
    replicas: 2
    tech: React 18, Axios, CSS

  users_service:
    name: Users and Authentication
    purpose: User management, authentication, authorization
    port: 3001
    replicas: 2
    endpoints:
      - POST /auth/login
      - POST /auth/register
      - GET /users
      - POST /users
      - PUT /users/:id
      - DELETE /users/:id

  orders_service:
    name: Orders Management
    purpose: Order creation, tracking, status management
    port: 3002
    replicas: 2
    endpoints:
      - GET /orders
      - POST /orders
      - PUT /orders/:id
      - DELETE /orders/:id
    integrations:
      - Notifications service

  shipments_service:
    name: Shipments and Tracking
    purpose: Shipment management, tracking, carrier info
    port: 3003
    replicas: 2
    endpoints:
      - GET /shipments
      - POST /shipments
      - PUT /shipments/:id
      - GET /shipments/track/:tracking_number

  inventory_service:
    name: Inventory Management
    purpose: Stock tracking, warehouse management, SKU management
    port: 3004
    replicas: 2
    endpoints:
      - GET /inventory
      - POST /inventory
      - PUT /inventory/:id
      - POST /inventory/:id/adjust
      - DELETE /inventory/:id

  notifications_service:
    name: Notifications
    purpose: Event notifications, alerts, user notifications
    port: 3005
    replicas: 1
    endpoints:
      - POST /notify
      - GET /notifications/:user_id
      - PUT /notifications/:id/read

database:
  type: PostgreSQL
  version: 15-Alpine
  strategy: Separate database per microservice
  persistence: StatefulSet with PVC
  
  databases:
    - name: users_db
      service: users-service
      tables: users
      storage: 1Gi
      
    - name: orders_db
      service: orders-service
      tables: orders
      storage: 1Gi
      
    - name: shipments_db
      service: shipments-service
      tables: shipments
      storage: 1Gi
      
    - name: inventory_db
      service: inventory-service
      tables: inventory_items
      storage: 1Gi
      
    - name: notifications_db
      service: notifications-service
      tables: notifications
      storage: 500Mi

deployment:
  platform: Kubernetes
  deployment_type: Multi-pod with load balancing
  frontend_exposure: LoadBalancer service
  backend_services: ClusterIP services
  
  scaling:
    frontend: 2 replicas
    microservices: 2 replicas each
    horizontal_scaling: kubectl scale deployment
    resource_limits:
      memory_request: 128Mi
      memory_limit: 256Mi
      cpu_request: 100m
      cpu_limit: 500m

features:
  authentication:
    - JWT token-based
    - Secure password hashing with bcryptjs
    - Role-based access control
    
  api_features:
    - RESTful endpoints
    - CORS enabled
    - Health checks on all services
    - Liveness and readiness probes
    
  business_features:
    - User management and profiles
    - Order creation and tracking
    - Real-time shipment tracking
    - Inventory management with warehouse support
    - Notification system

security:
  - JWT authentication
  - Password hashing (bcryptjs)
  - Kubernetes Secrets for sensitive data
  - CORS protection
  - No hardcoded credentials

scalability:
  - Horizontal scaling: Easy pod replication
  - Vertical scaling: Configurable resource limits
  - Database scaling: Ready for replication
  - Service communication: Internal cluster DNS
  
future_enhancements:
  - API Gateway for better request routing
  - Service registry for dynamic discovery
  - Message queue for async processing
  - Prometheus and Grafana for monitoring
  - ELK stack for centralized logging
  - Istio service mesh for advanced traffic control
  - Circuit breaker pattern implementation
  - Caching layer (Redis)
  - Database replication and backup

deployment_steps:
  1: Build Docker images
  2: Push to DockerHub
  3: Update K8s manifests with image names
  4: Apply ConfigMaps and Secrets
  5: Deploy databases
  6: Deploy database services
  7: Deploy microservices
  8: Deploy microservice services
  9: Deploy frontend
  10: Verify all pods running
  11: Access frontend via LoadBalancer external IP

testing_credentials:
  email: test@logistics.com
  password: password123
  note: Create via frontend or API after deployment

project_statistics:
  microservices: 5
  databases: 5
  total_services: 12 (5 services + 5 DBs + Frontend + 1 optional API Gateway)
  code_lines: ~3000+
  deployment_manifests: 20+
  docker_containers: 11
  kubernetes_resources: 30+
